<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E87C3A">
    <title>Arise - Edit Habits</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../pictures/arise_logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="edit-habits">
    <div class="app-container">
        <header class="header">
            <button id="nav-toggle" class="top-logo-button" type="button" aria-label="Open navigation menu" aria-controls="side-nav" aria-expanded="false">
                <img class="top-logo-icon" src="../pictures/arise_logo.png" alt="logo navigation icon">
            </button>
            <div id="nav-overlay" class="side-nav-overlay" aria-hidden="true"></div>
            <nav id="side-nav" class="side-nav-panel" aria-label="Site navigation">
                <h2 class="side-nav-title">Navigate</h2>
                <ul class="side-nav-list">
                    <li><a class="side-nav-link" href="../index.html">Home</a></li>
                    <li><a class="side-nav-link" href="monthly_habits.html">Monthly Habits</a></li>
                    <li><a class="side-nav-link" href="edit_habits.html">Edit Habits</a></li>
                </ul>
            </nav>

            <div class="header-center">
                <h1>Arise</h1>
                <p class="subtitle">Habit Tracker</p>
            </div>
            <div class="header-right">
                <p id="current-date" class="date-text"></p>
                <p class="status-text">Edit Habits</p>
            </div>
        </header>
        <main class="main-content home-main-content">
            <div class="card list-card">
                <h2>My Habits</h2>
                <div id="empty-state" class="empty-state">
                    <img src="../pictures/arise_logo.png" alt="Arise Logo" class="logo">
                    <p>No habits yet. Add one above to get started!</p>
                </div>
                <ul id="habit-list" class="habit-list"></ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('../sw.js').catch(() => {});
      }
    </script>
</body>
</html>
